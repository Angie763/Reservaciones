<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuidado de la Abuelita</title>

  <!-- ═══════════════════════════════════════════════════════════════════
       ESTILOS (CSS puro, sin frameworks)
       ═══════════════════════════════════════════════════════════════════ -->
  <style>
    /* ── Reset & variables ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-libre:      #4fc3f7;   /* azul – día libre          */
      --color-libre-hover:#039be5;
      --color-reservado:  #f48fb1;   /* rosa – día reservado       */
      --color-reservado-hover:#e91e63;
      --color-pending:    #ce93d8;   /* lila – carga optimista     */
      --color-bg:         #f5f5f5;
      --color-header:     #37474f;
      --color-text:       #212121;
      --radius:           8px;
      --shadow:           0 2px 8px rgba(0,0,0,.12);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
    }

    /* ── Header / título ───────────────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 1rem;
    }
    header h1 {
      font-size: 1.6rem;
      color: var(--color-header);
    }
    header p {
      font-size: .9rem;
      color: #757575;
    }

    /* ── Navegación de mes ─────────────────────────────────────────── */
    .nav-bar {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: .75rem;
    }
    .nav-bar button {
      background: var(--color-header);
      color: #fff;
      border: none;
      padding: .45rem 1rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: .95rem;
      transition: background .2s;
    }
    .nav-bar button:hover  { background: #546e7a; }
    .nav-bar button:disabled {
      background: #bdbdbd;
      cursor: not-allowed;
    }
    .nav-bar .month-label {
      min-width: 190px;
      text-align: center;
      font-weight: 600;
      font-size: 1.15rem;
      text-transform: capitalize;
    }

    /* ── Leyenda ───────────────────────────────────────────────────── */
    .legend {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: .75rem;
      font-size: .85rem;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: .35rem;
    }
    .legend-box {
      width: 18px;
      height: 18px;
      border-radius: 4px;
    }
    .legend-box.libre     { background: var(--color-libre); }
    .legend-box.reservado { background: var(--color-reservado); }
    .legend-box.pending   { background: var(--color-pending); }

    /* ── Contadores ────────────────────────────────────────────────── */
    .counters {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 1rem;
      font-size: .9rem;
      font-weight: 500;
    }
    .counters span { padding: .25rem .6rem; border-radius: var(--radius); }
    .count-libre     { background: var(--color-libre); color: #fff; }
    .count-reservado { background: var(--color-reservado); color: #fff; }

    /* ── Calendario (grid) ─────────────────────────────────────────── */
    .calendar {
      width: 100%;
      max-width: 700px;
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1rem;
      margin-bottom: 1.5rem;
    }
    .weekday-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-weight: 600;
      font-size: .82rem;
      color: #78909c;
      margin-bottom: .35rem;
    }
    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    /* ── Celda de día ──────────────────────────────────────────────── */
    .day-cell {
      position: relative;
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 600;
      font-size: .95rem;
      transition: transform .15s, box-shadow .15s, background .25s;
      user-select: none;
    }
    .day-cell:hover {
      transform: scale(1.08);
      box-shadow: 0 3px 10px rgba(0,0,0,.18);
      z-index: 2;
    }
    .day-cell.empty {
      background: transparent;
      cursor: default;
      pointer-events: none;
    }
    .day-cell.libre {
      background: var(--color-libre);
      color: #fff;
    }
    .day-cell.libre:hover { background: var(--color-libre-hover); }
    .day-cell.reservado {
      background: var(--color-reservado);
      color: #fff;
    }
    .day-cell.reservado:hover { background: var(--color-reservado-hover); }
    .day-cell.pending {
      background: var(--color-pending);
      color: #fff;
      animation: pulse .8s infinite alternate;
    }
    @keyframes pulse {
      from { opacity: .7; }
      to   { opacity: 1;  }
    }

    /* Nombre dentro del día */
    .day-cell .person-name {
      font-size: .55rem;
      font-weight: 400;
      max-width: 90%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-top: 1px;
    }

    /* Tooltip */
    .day-cell[data-tooltip]:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #37474f;
      color: #fff;
      padding: .3rem .6rem;
      border-radius: 4px;
      font-size: .75rem;
      white-space: nowrap;
      pointer-events: none;
      z-index: 10;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
    }

    /* ── Notificación / Toast ──────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #37474f;
      color: #fff;
      padding: .6rem 1.2rem;
      border-radius: var(--radius);
      font-size: .9rem;
      opacity: 0;
      transition: transform .35s, opacity .35s;
      z-index: 100;
      pointer-events: none;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .toast.error { background: #c62828; }

    /* ── Estado de conexión ─────────────────────────────────────────── */
    .connection-status {
      font-size: .78rem;
      margin-bottom: .5rem;
      display: flex;
      align-items: center;
      gap: .35rem;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #66bb6a;
    }
    .status-dot.offline { background: #ef5350; }
    .status-dot.loading { background: #ffa726; animation: pulse .6s infinite alternate; }

    /* ── Responsivo ────────────────────────────────────────────────── */
    @media (max-width: 500px) {
      .day-cell { font-size: .78rem; }
      .day-cell .person-name { font-size: .48rem; }
      .calendar { padding: .5rem; }
      .nav-bar button { padding: .35rem .6rem; font-size: .85rem; }
    }

    /* ── Footer ────────────────────────────────────────────────────── */
    footer {
      margin-top: auto;
      padding: 1rem;
      font-size: .75rem;
      color: #9e9e9e;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════════════
       HTML – Estructura
       ═══════════════════════════════════════════════════════════════════ -->
  <header>
    <h1>🗓️ Cuidado de la Abuelita</h1>
    <p>Marzo 2026 – Marzo 2027</p>
  </header>

  <!-- Estado de conexión -->
  <div class="connection-status">
    <span class="status-dot loading" id="statusDot"></span>
    <span id="statusText">Conectando con Firestore…</span>
  </div>

  <!-- Navegación -->
  <nav class="nav-bar">
    <button id="btnPrev">◀ Anterior</button>
    <span class="month-label" id="monthLabel"></span>
    <button id="btnNext">Siguiente ▶</button>
  </nav>

  <!-- Leyenda -->
  <div class="legend">
    <div class="legend-item"><span class="legend-box libre"></span> Libre</div>
    <div class="legend-item"><span class="legend-box reservado"></span> Reservado</div>
    <div class="legend-item"><span class="legend-box pending"></span> Guardando…</div>
  </div>

  <!-- Contadores -->
  <div class="counters">
    <span class="count-libre" id="countLibre">Libres: 0</span>
    <span class="count-reservado" id="countReservado">Reservados: 0</span>
  </div>

  <!-- Calendario -->
  <section class="calendar">
    <div class="weekday-header">
      <span>Lun</span><span>Mar</span><span>Mié</span>
      <span>Jue</span><span>Vie</span><span>Sáb</span><span>Dom</span>
    </div>
    <div class="days-grid" id="daysGrid"></div>
  </section>

  <!-- Toast (notificaciones) -->
  <div class="toast" id="toast"></div>

  <footer>
    Hecho con ❤️ para la familia.
  </footer>

  <!-- Firebase App (compat para poder usar como estático sin bundler) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <!-- Firestore -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
    // ═══════════════════════════════════════════════════════════════════
    // SECCIÓN 1 — CONFIGURACIÓN DE FIREBASE
    // ═══════════════════════════════════════════════════════════════════
    const firebaseConfig = {
      apiKey:            "AIzaSyATnTsOFSjEOCxNBllTealcHBxvdlNJThA",            
      authDomain:        "calendar-abu.firebaseapp.com",        
      projectId:         "calendar-abu",         
      storageBucket:     "calendar-abu.firebasestorage.app",    
      messagingSenderId: "543127128639",// Ejemplo: "123456789012"
      appId:             "1:543127128639:web:1b12ced6f1be359c80468a"              
    };

    // Inicializar Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const db  = firebase.firestore();

    // Referencia a la colección de reservas
    const reservasRef = db.collection("reservas");

    // ═══════════════════════════════════════════════════════════════════
    // SECCIÓN 2 — CONSTANTES Y ESTADO
    // ═══════════════════════════════════════════════════════════════════

    /** Rango del calendario: marzo 2026 → marzo 2027 */
    const MONTH_START = { year: 2026, month: 2 }; // month 0-indexed (2 = marzo)
    const MONTH_END   = { year: 2027, month: 2 }; // marzo 2027 inclusive

    /** Nombres de meses en español */
    const MESES = [
      "Enero","Febrero","Marzo","Abril","Mayo","Junio",
      "Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"
    ];

    /** Estado actual del mes mostrado */
    let currentYear  = MONTH_START.year;
    let currentMonth = MONTH_START.month;

    /**
     * Caché local de reservas: Map<string, {nombre, fechaISO, timestamp}>
     * La clave es "YYYY-MM-DD".
     */
    const reservasCache = new Map();

    /** IDs de días con carga optimista pendiente */
    const pendingDays = new Set();

    /** Referencia al listener de onSnapshot (para poder desuscribirse si hiciera falta) */
    let unsubscribeSnapshot = null;

    // ═══════════════════════════════════════════════════════════════════
    // SECCIÓN 3 — UTILIDADES
    // ═══════════════════════════════════════════════════════════════════

    /** Formatea una fecha como "YYYY-MM-DD" (ID del documento) */
    function dateToId(year, month, day) {
      const mm = String(month + 1).padStart(2, "0");
      const dd = String(day).padStart(2, "0");
      return `${year}-${mm}-${dd}`;
    }

    /** ¿El mes/año está dentro del rango permitido? */
    function monthInRange(y, m) {
      const val  = y * 12 + m;
      const lo   = MONTH_START.year * 12 + MONTH_START.month;
      const hi   = MONTH_END.year   * 12 + MONTH_END.month;
      return val >= lo && val <= hi;
    }

    /** Muestra un "toast" con mensaje. Clase extra: "error" */
    function showToast(msg, isError = false) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.className = "toast show" + (isError ? " error" : "");
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => el.className = "toast", 3500);
    }

    /** Actualiza el indicador de conexión */
    function setConnectionStatus(state) {
      const dot  = document.getElementById("statusDot");
      const text = document.getElementById("statusText");
      dot.className = "status-dot " + state;
      const labels = {
        "":        "Conectado ✓",
        "loading": "Conectando con Firestore…",
        "offline": "Sin conexión — cambios locales pendientes"
      };
      text.textContent = labels[state] ?? "";
    }

    // ═══════════════════════════════════════════════════════════════════
    // SECCIÓN 4 — PERSISTENCIA CON FIRESTORE + TIEMPO REAL
    // ═══════════════════════════════════════════════════════════════════

    /**
     * Suscribirse a TODA la colección "reservas" para el rango del año.
     * Se usa `onSnapshot` para recibir actualizaciones en tiempo real.
     */
    function subscribeToReservas() {
      // Desuscribir anterior si existe
      if (unsubscribeSnapshot) unsubscribeSnapshot();

      setConnectionStatus("loading");

      unsubscribeSnapshot = reservasRef.onSnapshot(
        (snapshot) => {
          // Limpiar caché y reconstruir
          reservasCache.clear();
          snapshot.forEach((doc) => {
            reservasCache.set(doc.id, doc.data());
          });
          setConnectionStatus("");
          renderMonth(); // Repintar la UI con datos frescos
        },
        (error) => {
          console.error("Error en onSnapshot:", error);
          setConnectionStatus("offline");
          showToast("Error de conexión con Firestore", true);
        }
      );
    }

    /**
     * Crear una reserva (carga optimista).
     * - Primero pintamos el día en color "pending".
     * - Luego usamos una transacción para evitar colisiones.
     * - Si falla, revertimos.
     */
    async function crearReserva(dateId, nombre) {
      // 1. Carga optimista: marcar como pendiente
      pendingDays.add(dateId);
      renderMonth();

      try {
        const docRef = reservasRef.doc(dateId);

        // Transacción para manejar colisiones
        await db.runTransaction(async (transaction) => {
          const docSnap = await transaction.get(docRef);
          if (docSnap.exists) {
            // Alguien reservó antes ⇒ la transacción falla
            throw new Error("COLISION");
          }
          transaction.set(docRef, {
            nombre:   nombre,
            fechaISO: dateId,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
          });
        });

        showToast(`✅ Reservado para "${nombre}"`);
      } catch (err) {
        if (err.message === "COLISION") {
          showToast("⚠️ Ese día ya fue reservado por otra persona.", true);
        } else {
          console.error("Error al reservar:", err);
          showToast("❌ Error al guardar la reserva. Intenta de nuevo.", true);
        }
      } finally {
        pendingDays.delete(dateId);
        // onSnapshot ya repinta, pero forzamos por si acaso
        renderMonth();
      }
    }

    /**
     * Liberar una reserva existente (eliminar documento).
     */
    async function liberarReserva(dateId) {
      pendingDays.add(dateId);
      renderMonth();

      try {
        await reservasRef.doc(dateId).delete();
        showToast("🔓 Día liberado correctamente");
      } catch (err) {
        console.error("Error al liberar:", err);
        showToast("❌ Error al liberar el día.", true);
      } finally {
        pendingDays.delete(dateId);
        renderMonth();
      }
    }

    // ═══════════════════════════════════════════════════════════════════
    // SECCIÓN 5 — RENDERIZADO DEL CALENDARIO
    // ═══════════════════════════════════════════════════════════════════

    /** Pintar el mes actual */
    function renderMonth() {
      const grid  = document.getElementById("daysGrid");
      const label = document.getElementById("monthLabel");

      label.textContent = `${MESES[currentMonth]} ${currentYear}`;

      // Guardar último mes visto en localStorage
      localStorage.setItem("cal_lastMonth", JSON.stringify({ y: currentYear, m: currentMonth }));

      // Calcular días del mes y día de la semana del primer día
      const firstDay  = new Date(currentYear, currentMonth, 1);
      const daysCount = new Date(currentYear, currentMonth + 1, 0).getDate();

      // Día de la semana: Lunes = 0, Domingo = 6
      let startDay = firstDay.getDay() - 1;
      if (startDay < 0) startDay = 6; // Domingo → última columna

      // Construir celdas
      let html = "";
      let countLibre = 0;
      let countReservado = 0;

      // Espacios vacíos antes del día 1
      for (let i = 0; i < startDay; i++) {
        html += `<div class="day-cell empty"></div>`;
      }

      for (let d = 1; d <= daysCount; d++) {
        const dateId  = dateToId(currentYear, currentMonth, d);
        const reserva = reservasCache.get(dateId);
        const isPending = pendingDays.has(dateId);

        let cellClass = "day-cell ";
        let tooltip   = "";
        let personHtml = "";

        if (isPending) {
          cellClass += "pending";
        } else if (reserva) {
          cellClass += "reservado";
          tooltip = `Reservado por: ${reserva.nombre}`;
          personHtml = `<span class="person-name">${escapeHtml(reserva.nombre)}</span>`;
          countReservado++;
        } else {
          cellClass += "libre";
          countLibre++;
        }

        html += `<div class="${cellClass}" data-date="${dateId}"
                      ${tooltip ? `data-tooltip="${escapeAttr(tooltip)}"` : ""}>
                    ${d}${personHtml}
                 </div>`;
      }

      grid.innerHTML = html;

      // Actualizar contadores
      document.getElementById("countLibre").textContent     = `Libres: ${countLibre}`;
      document.getElementById("countReservado").textContent  = `Reservados: ${countReservado}`;

      // Actualizar estado de botones de navegación
      updateNavButtons();
    }

    /** Escapar HTML para evitar XSS */
    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    /** Escapar atributo */
    function escapeAttr(str) {
      return str.replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    // ═══════════════════════════════════════════════════════════════════
    // SECCIÓN 6 — NAVEGACIÓN ENTRE MESES
    // ═══════════════════════════════════════════════════════════════════

    function goToPrevMonth() {
      let y = currentYear, m = currentMonth - 1;
      if (m < 0) { m = 11; y--; }
      if (monthInRange(y, m)) { currentYear = y; currentMonth = m; renderMonth(); }
    }

    function goToNextMonth() {
      let y = currentYear, m = currentMonth + 1;
      if (m > 11) { m = 0; y++; }
      if (monthInRange(y, m)) { currentYear = y; currentMonth = m; renderMonth(); }
    }

    function updateNavButtons() {
      let prevY = currentYear, prevM = currentMonth - 1;
      if (prevM < 0) { prevM = 11; prevY--; }

      let nextY = currentYear, nextM = currentMonth + 1;
      if (nextM > 11) { nextM = 0; nextY++; }

      document.getElementById("btnPrev").disabled = !monthInRange(prevY, prevM);
      document.getElementById("btnNext").disabled = !monthInRange(nextY, nextM);
    }

    // ═══════════════════════════════════════════════════════════════════
    // SECCIÓN 7 — MANEJO DE CLICS EN DÍAS
    // ═══════════════════════════════════════════════════════════════════

    function handleDayClick(e) {
      const cell = e.target.closest(".day-cell[data-date]");
      if (!cell) return;

      const dateId = cell.dataset.date;

      // Si está pendiente, no hacer nada
      if (pendingDays.has(dateId)) {
        showToast("⏳ Operación en curso, espera un momento…");
        return;
      }

      const reserva = reservasCache.get(dateId);

      if (reserva) {
        // ── El día está reservado → preguntar si quiere liberar ──
        const confirmar = confirm(
          `Este día está reservado por "${reserva.nombre}".\n¿Deseas liberar este día?`
        );
        if (confirmar) liberarReserva(dateId);
      } else {
        // ── Día libre → pedir nombre ──
        const nombre = prompt("¿Quién cuidará a la abuelita este día?");

        // Validar entrada
        if (nombre === null) return; // Canceló el prompt
        const nombreTrim = nombre.trim();
        if (!nombreTrim) {
          showToast("⚠️ El nombre no puede estar vacío.", true);
          return;
        }
        if (nombreTrim.length > 80) {
          showToast("⚠️ El nombre es demasiado largo (máx. 80 caracteres).", true);
          return;
        }

        crearReserva(dateId, nombreTrim);
      }
    }

    // ═══════════════════════════════════════════════════════════════════
    // SECCIÓN 8 — INICIALIZACIÓN
    // ═══════════════════════════════════════════════════════════════════

    (function init() {
      // Restaurar último mes visto desde localStorage
      try {
        const saved = JSON.parse(localStorage.getItem("cal_lastMonth"));
        if (saved && monthInRange(saved.y, saved.m)) {
          currentYear  = saved.y;
          currentMonth = saved.m;
        }
      } catch (_) { /* ignorar */ }

      // Bindear navegación
      document.getElementById("btnPrev").addEventListener("click", goToPrevMonth);
      document.getElementById("btnNext").addEventListener("click", goToNextMonth);

      // Bindear clics en el grid (delegación de eventos)
      document.getElementById("daysGrid").addEventListener("click", handleDayClick);

      // Navegación con teclado (flechas izquierda/derecha)
      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowLeft")  goToPrevMonth();
        if (e.key === "ArrowRight") goToNextMonth();
      });

      // Primer renderizado (sin datos aún)
      renderMonth();

      // Suscribirse a Firestore en tiempo real
      subscribeToReservas();
    })();
  </script>
</body>
</html>
