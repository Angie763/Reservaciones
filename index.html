<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuidado de Abuelita — Reservaciones 2026-2027</title>
    <style>
        :root {
            --blue-50: #eff6ff;
            --blue-100: #dbeafe;
            --blue-200: #bfdbfe;
            --blue-300: #93c5fd;
            --blue-400: #60a5fa;
            --blue-500: #3b82f6;
            --blue-600: #2563eb;
            --blue-700: #1d4ed8;
            --pink-50: #fdf2f8;
            --pink-100: #fce7f3;
            --pink-200: #fbcfe8;
            --pink-300: #f9a8d4;
            --pink-400: #f472b6;
            --pink-500: #ec4899;
            --pink-600: #db2777;
            --pink-700: #be185d;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-300: #cbd5e1;
            --slate-400: #94a3b8;
            --slate-500: #64748b;
            --slate-600: #475569;
            --slate-700: #334155;
            --slate-800: #1e293b;
            --slate-900: #0f172a;
            --radius: 14px;
            --radius-sm: 8px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
            --transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
        }

        *{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth}

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(160deg,#eef2ff 0%,#fdf2f8 40%,#eff6ff 100%);
            color: var(--slate-800);
            min-height: 100vh;
        }

        /* ── Animated background ── */
        .bg-decor{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
        .bg-decor .orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.22;animation:drift 22s infinite ease-in-out}
        .bg-decor .orb:nth-child(1){width:520px;height:520px;background:var(--blue-200);top:-120px;left:-80px}
        .bg-decor .orb:nth-child(2){width:440px;height:440px;background:var(--pink-200);bottom:-100px;right:-60px;animation-delay:-8s}
        .bg-decor .orb:nth-child(3){width:360px;height:360px;background:var(--blue-100);top:40%;left:50%;animation-delay:-15s}
        @keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(25px,-25px) scale(1.04)}66%{transform:translate(-18px,18px) scale(.96)}}

        /* ── Header ── */
        header{position:relative;z-index:10;text-align:center;padding:48px 24px 16px}
        header .emoji{font-size:56px;margin-bottom:10px;display:inline-block;animation:bounce 3s infinite ease-in-out}
        @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
        header h1{font-size:clamp(26px,5vw,44px);font-weight:800;background:linear-gradient(135deg,var(--blue-700),var(--pink-600));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.4px}
        header .subtitle{margin-top:6px;color:var(--slate-500);font-size:15px;font-weight:500}

        /* ── Stats ── */
        .stats{position:relative;z-index:10;display:flex;justify-content:center;gap:14px;padding:18px 24px 28px;flex-wrap:wrap}
        .stat{background:rgba(255,255,255,.75);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.5);border-radius:12px;padding:14px 24px;text-align:center;box-shadow:var(--shadow-sm);transition:var(--transition);min-width:120px}
        .stat:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
        .stat-val{font-size:26px;font-weight:800;line-height:1}
        .stat-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--slate-400);margin-top:3px}
        .stat-val.blue{color:var(--blue-600)}
        .stat-val.pink{color:var(--pink-600)}
        .stat-val.grad{background:linear-gradient(135deg,var(--blue-600),var(--pink-600));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

        /* ── Sticky month nav ── */
        .month-nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.82);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.05);padding:12px 20px;display:flex;align-items:center;justify-content:center;gap:5px;flex-wrap:wrap}
        .month-nav button{background:none;border:none;padding:7px 13px;border-radius:50px;font-size:12.5px;font-weight:600;color:var(--slate-500);cursor:pointer;transition:var(--transition);white-space:nowrap}
        .month-nav button:hover{background:var(--blue-50);color:var(--blue-700)}
        .month-nav button.active{background:linear-gradient(135deg,var(--blue-600),var(--blue-700));color:#fff;box-shadow:0 2px 10px rgba(37,99,235,.3)}

        /* ── Months wrapper ── */
        .months{position:relative;z-index:10;max-width:1200px;margin:0 auto;padding:28px 20px 56px;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:24px}

        /* ── Month card ── */
        .mo-card{background:rgba(255,255,255,.72);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.55);border-radius:20px;padding:22px;box-shadow:var(--shadow);transition:var(--transition);animation:fadeUp .5s ease both}
        .mo-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px)}
        .mo-title{font-size:19px;font-weight:800;color:var(--slate-800);margin-bottom:14px;display:flex;align-items:center;gap:8px}
        .mo-badge{font-size:11px;font-weight:700;background:var(--slate-100);color:var(--slate-500);padding:3px 10px;border-radius:50px}

        /* ── Week header ── */
        .wk-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:5px}
        .wk-hdr span{text-align:center;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--slate-400);padding:3px 0}

        /* ── Days grid ── */
        .days{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}

        /* ── Day cell ── */
        .dc{aspect-ratio:1;border-radius:var(--radius-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:14px;font-weight:700;cursor:pointer;transition:var(--transition);position:relative;min-height:44px;border:2px solid transparent}
        .dc:hover{transform:scale(1.1);z-index:2}

        .dc.empty{cursor:default;background:transparent}
        .dc.empty:hover{transform:none}

        /* Free = BLUE */
        .dc.free{background:linear-gradient(145deg,var(--blue-100),var(--blue-200));color:var(--blue-700);border-color:var(--blue-200)}
        .dc.free:hover{background:linear-gradient(145deg,var(--blue-200),var(--blue-300));box-shadow:0 4px 16px rgba(59,130,246,.25);border-color:var(--blue-400)}

        /* Reserved = PINK */
        .dc.reserved{background:linear-gradient(145deg,var(--pink-100),var(--pink-200));color:var(--pink-700);border-color:var(--pink-200)}
        .dc.reserved:hover{background:linear-gradient(145deg,var(--pink-200),var(--pink-300));box-shadow:0 4px 16px rgba(236,72,153,.25);border-color:var(--pink-400)}

        /* Today */
        .dc.today{box-shadow:0 0 0 3px var(--blue-500),0 4px 12px rgba(59,130,246,.3)}

        .d-num{line-height:1}
        .d-name{font-size:7px;font-weight:700;line-height:1.1;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px;letter-spacing:.2px;color:var(--pink-600)}

        /* Tooltip */
        .dc.reserved[data-person]::after{content:'💝 ' attr(data-person);position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%) scale(.9);background:var(--slate-800);color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;white-space:nowrap;pointer-events:none;opacity:0;transition:all .2s ease;z-index:50;box-shadow:0 4px 16px rgba(0,0,0,.2)}
        .dc.reserved[data-person]::before{content:'';position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--slate-800);pointer-events:none;opacity:0;transition:all .2s ease;z-index:50}
        .dc.reserved[data-person]:hover::after,.dc.reserved[data-person]:hover::before{opacity:1}
        .dc.reserved[data-person]:hover::after{transform:translateX(-50%) scale(1)}

        /* ── Legend ── */
        .legend{position:relative;z-index:10;display:flex;justify-content:center;gap:28px;padding:0 24px 48px;flex-wrap:wrap}
        .legend-item{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--slate-500)}
        .legend-dot{width:14px;height:14px;border-radius:5px}
        .legend-dot.bl{background:linear-gradient(135deg,var(--blue-200),var(--blue-400))}
        .legend-dot.pk{background:linear-gradient(135deg,var(--pink-200),var(--pink-400))}

        /* ── Modal ── */
        .overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.45);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s ease;padding:24px}
        .overlay.on{opacity:1;pointer-events:all}
        .modal{background:#fff;border-radius:24px;padding:36px 32px;max-width:400px;width:100%;box-shadow:var(--shadow-lg);transform:scale(.92) translateY(16px);transition:transform .3s cubic-bezier(.34,1.56,.64,1);text-align:center}
        .overlay.on .modal{transform:scale(1) translateY(0)}
        .modal .mi{font-size:44px;margin-bottom:12px}
        .modal h2{font-size:20px;font-weight:800;color:var(--slate-800);margin-bottom:4px}
        .modal .md{font-size:14px;color:var(--slate-500);font-weight:500;margin-bottom:20px}
        .modal input{width:100%;padding:13px 18px;border:2px solid var(--slate-200);border-radius:12px;font-size:15px;font-weight:500;outline:none;transition:var(--transition);font-family:inherit}
        .modal input:focus{border-color:var(--pink-400);box-shadow:0 0 0 4px rgba(244,114,182,.12)}
        .modal input::placeholder{color:var(--slate-300)}
        .mb{display:flex;gap:10px;margin-top:18px}
        .btn{flex:1;padding:13px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:var(--transition);font-family:inherit}
        .btn.cancel{background:var(--slate-100);color:var(--slate-600)}
        .btn.cancel:hover{background:var(--slate-200)}
        .btn.confirm{background:linear-gradient(135deg,var(--pink-500),var(--pink-600));color:#fff;box-shadow:0 4px 14px rgba(236,72,153,.3)}
        .btn.confirm:hover{box-shadow:0 6px 20px rgba(236,72,153,.4);transform:translateY(-1px)}
        .btn.remove{background:var(--slate-800);color:#fff}
        .btn.remove:hover{background:var(--slate-900);transform:translateY(-1px)}

        /* ── Toast ── */
        .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--slate-800);color:#fff;padding:14px 26px;border-radius:14px;font-size:14px;font-weight:600;z-index:2000;box-shadow:var(--shadow-lg);transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
        .toast.show{transform:translateX(-50%) translateY(0)}

        /* ── Responsive ── */
        @media(max-width:768px){
            .months{grid-template-columns:1fr;padding:20px 14px 50px;gap:18px}
            .mo-card{padding:16px}
            .dc{font-size:12px;min-height:36px}
            .d-name{font-size:6px}
            .month-nav{gap:3px;padding:8px 10px}
            .month-nav button{padding:5px 9px;font-size:10.5px}
        }
        @media(max-width:480px){
            header{padding:32px 16px 12px}
            .dc{min-height:30px}
            .d-num{font-size:11px}
            .modal{padding:28px 24px}
        }

        ::-webkit-scrollbar{width:7px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:var(--slate-300);border-radius:4px}

        @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
        @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
    </style>
</head>
<body>

<div class="bg-decor"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>

<header>
    <div class="emoji">👵🏼</div>
    <h1>Cuidado de Abuelita</h1>
    <p class="subtitle">Reservaciones · Marzo 2026 — Marzo 2027</p>
</header>

<div class="stats">
    <div class="stat"><div class="stat-val grad" id="sT">0</div><div class="stat-lbl">Días totales</div></div>
    <div class="stat"><div class="stat-val blue" id="sF">0</div><div class="stat-lbl">Disponibles</div></div>
    <div class="stat"><div class="stat-val pink" id="sR">0</div><div class="stat-lbl">Reservados</div></div>
</div>

<nav class="month-nav" id="nav"></nav>
<div class="months" id="grid"></div>

<div class="legend">
    <div class="legend-item"><div class="legend-dot bl"></div> Día libre (azul)</div>
    <div class="legend-item"><div class="legend-dot pk"></div> Día reservado (rosa)</div>
</div>

<div class="overlay" id="ov">
    <div class="modal">
        <div class="mi" id="mI">📅</div>
        <h2 id="mT">Reservar turno</h2>
        <div class="md" id="mD"></div>
        <input id="mIn" type="text" placeholder="Nombre de la persona..." maxlength="30" autocomplete="off">
        <div class="mb" id="mB"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
(()=>{
    /* ── Config ── */
    const START=new Date(2026,2,1),END=new Date(2027,2,31),SK='abuelita_reserv_v4';
    const MES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    const DIA=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    const EMO=['❄️','💐','🌸','🌷','🌻','☀️','🌊','🌅','🍂','🎃','🍁','🎄'];

    /* ── State ── */
    let data=load();
    function dk(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
    function load(){try{return JSON.parse(localStorage.getItem(SK))||{}}catch{return{}}}
    function save(){localStorage.setItem(SK,JSON.stringify(data))}
    function inR(d){return d>=START&&d<=END}
    function isToday(d){const t=new Date();return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate()}

    /* ── Month list ── */
    function getMonths(){
        const l=[];let y=START.getFullYear(),m=START.getMonth();
        const ey=END.getFullYear(),em=END.getMonth();
        while(y<ey||(y===ey&&m<=em)){l.push({y,m});if(++m>11){m=0;y++}}
        return l;
    }

    /* ── Nav ── */
    function buildNav(months){
        const nav=document.getElementById('nav');nav.innerHTML='';
        months.forEach(({y,m},i)=>{
            const b=document.createElement('button');
            b.textContent=`${MES[m].substring(0,3)} ${y}`;b.dataset.i=i;
            b.addEventListener('click',()=>{
                const el=document.getElementById(`m${y}-${m}`);
                if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
            });
            nav.appendChild(b);
        });
    }

    /* ── Scroll spy ── */
    let obs=null;
    function spy(months){
        if(obs)obs.disconnect();
        obs=new IntersectionObserver(es=>{
            es.forEach(e=>{
                if(e.isIntersecting){
                    const[,yy,mm]=e.target.id.match(/m(\d+)-(\d+)/);
                    document.querySelectorAll('.month-nav button').forEach(b=>b.classList.remove('active'));
                    const idx=months.findIndex(x=>x.y==yy&&x.m==mm);
                    const btn=document.querySelector(`.month-nav button[data-i="${idx}"]`);
                    if(btn){btn.classList.add('active');btn.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'})}
                }
            });
        },{threshold:.25,rootMargin:'-80px 0px -40% 0px'});
        months.forEach(({y,m})=>{const el=document.getElementById(`m${y}-${m}`);if(el)obs.observe(el)});
    }

    /* ── Month reserved count ── */
    function mRes(y,m){
        let r=0;const n=new Date(y,m+1,0).getDate();
        for(let d=1;d<=n;d++){const dt=new Date(y,m,d);if(inR(dt)&&data[dk(dt)])r++}
        return r;
    }

    /* ── Render ── */
    function render(){
        const g=document.getElementById('grid');g.innerHTML='';
        const months=getMonths();

        months.forEach(({y,m},idx)=>{
            const card=document.createElement('div');
            card.className='mo-card';card.id=`m${y}-${m}`;
            card.style.animationDelay=`${idx*.04}s`;

            /* title */
            const t=document.createElement('div');t.className='mo-title';
            t.innerHTML=`${EMO[m]} ${MES[m]} ${y} <span class="mo-badge">${mRes(y,m)} reserv.</span>`;
            card.appendChild(t);

            /* day headers */
            const wh=document.createElement('div');wh.className='wk-hdr';
            DIA.forEach(d=>{const s=document.createElement('span');s.textContent=d;wh.appendChild(s)});
            card.appendChild(wh);

            /* days */
            const dg=document.createElement('div');dg.className='days';
            const first=new Date(y,m,1).getDay(),total=new Date(y,m+1,0).getDate();

            for(let i=0;i<first;i++){const e=document.createElement('div');e.className='dc empty';dg.appendChild(e)}

            for(let d=1;d<=total;d++){
                const date=new Date(y,m,d),key=dk(date),ok=inR(date),person=data[key];
                const c=document.createElement('div');c.className='dc';

                if(!ok){c.classList.add('empty');c.style.opacity='.2';c.style.cursor='default'}
                else if(person){c.classList.add('reserved');c.dataset.person=person}
                else c.classList.add('free');

                if(isToday(date))c.classList.add('today');

                const num=document.createElement('div');num.className='d-num';num.textContent=d;c.appendChild(num);

                if(person&&ok){const nm=document.createElement('div');nm.className='d-name';nm.textContent=person;c.appendChild(nm)}
                if(ok)c.addEventListener('click',()=>openModal(date));
                dg.appendChild(c);
            }
            card.appendChild(dg);g.appendChild(card);
        });

        buildNav(months);
        setTimeout(()=>spy(months),80);
        updStats();
    }

    /* ── Stats ── */
    function updStats(){
        let tot=0,res=0;const d=new Date(START);
        while(d<=END){tot++;if(data[dk(d)])res++;d.setDate(d.getDate()+1)}
        document.getElementById('sT').textContent=tot;
        document.getElementById('sF').textContent=tot-res;
        document.getElementById('sR').textContent=res;
    }

    /* ── Modal ── */
    let sel=null;
    const ov=document.getElementById('ov'),inp=document.getElementById('mIn');

    function openModal(date){
        sel=date;const key=dk(date),person=data[key];
        const label=`${DIA[date.getDay()]} ${date.getDate()} de ${MES[date.getMonth()]} ${date.getFullYear()}`;
        document.getElementById('mD').textContent=label;

        if(person){
            document.getElementById('mI').textContent='💝';
            document.getElementById('mT').textContent='Turno reservado';
            inp.value=person;inp.placeholder='Cambiar nombre...';
            document.getElementById('mB').innerHTML=
                `<button class="btn cancel" onclick="window._cl()">Cerrar</button>
                 <button class="btn remove" onclick="window._rm()">Liberar</button>
                 <button class="btn confirm" onclick="window._ok()">Guardar</button>`;
        }else{
            document.getElementById('mI').textContent='📅';
            document.getElementById('mT').textContent='Reservar turno';
            inp.value='';inp.placeholder='Nombre de la persona...';
            document.getElementById('mB').innerHTML=
                `<button class="btn cancel" onclick="window._cl()">Cancelar</button>
                 <button class="btn confirm" onclick="window._ok()">Reservar</button>`;
        }
        ov.classList.add('on');
        setTimeout(()=>inp.focus(),250);
    }

    window._cl=()=>{ov.classList.remove('on');sel=null};

    window._ok=()=>{
        const name=inp.value.trim();
        if(!name){inp.style.borderColor='#ef4444';inp.style.animation='shake .35s ease';setTimeout(()=>{inp.style.borderColor='';inp.style.animation=''},400);return}
        const key=dk(sel),isNew=!data[key];
        data[key]=name;save();window._cl();render();
        toast(isNew?`✅ ${name} reservó el ${sel.getDate()} de ${MES[sel.getMonth()].substring(0,3)}`:`✏️ Turno actualizado a ${name}`);
    };

    window._rm=()=>{
        const key=dk(sel),name=data[key];
        delete data[key];save();window._cl();render();
        toast(`🔓 Turno de ${name} liberado`);
    };

    inp.addEventListener('keydown',e=>{if(e.key==='Enter')window._ok()});
    ov.addEventListener('click',e=>{if(e.target===ov)window._cl()});
    document.addEventListener('keydown',e=>{if(e.key==='Escape'&&ov.classList.contains('on'))window._cl()});

    /* ── Toast ── */
    function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}

    /* ── Init ── */
    render();
    const now=new Date();
    if(now>=START&&now<=END){
        const el=document.getElementById(`m${now.getFullYear()}-${now.getMonth()}`);
        if(el)setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'start'}),500);
    }
})();
</script>
</body>
</html>
